<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* Modern Reset & Font */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Fancy Container */
        form {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        form:hover {
            transform: translateY(-2px);
        }

        /* Typography */
        h2 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Input Fields Styling */
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Focus States */
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: #4f46e5;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Textarea specific */
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        /* Fancy File Input */
        input[type="file"] {
            padding: 12px;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }

        /* Fancy Button */
        button[type="submit"] {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: linear-gradient(135deg, #4338ca 0%, #2e268f 100%);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        /* Placeholder styles */
        ::placeholder {
            color: #94a3b8;
            opacity: 1;
        }
    </style>
</head>
<body>
<h2>Додавання нової позиції</h2>
    <form method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <input type="text" name="name" placeholder="Назва позиції" required>

        <input type="file" name="img" accept="image/*" required>

        <textarea name="ingredients" placeholder="Інгредієнти" required></textarea>

        <textarea name="description" placeholder="Опис" required></textarea>

        <input type="number" name="price" placeholder="Ціна (грн)" required>

        <input type="number" name="weight" placeholder="Вага (г)" required>

        <button type="submit">Додати товар</button>
    </form>
</body>
</html>
